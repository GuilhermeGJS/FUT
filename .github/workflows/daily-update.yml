name: ⚽ ANLS — Análise Diária Automática

on:
  schedule:
    - cron: "0 10 * * *"  # 10:00 UTC = 7:00 Brasília
  workflow_dispatch:

jobs:
  analyse:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: ⚽ Rodar análise automática (motor interno)
        run: python auto_analysis.py

      - name: 💾 Commit e push automático
        run: |
          git config user.name "ANLS Bot"
          git config user.email "bot@anls.dev"
          git add dashboard.html index.html .last-update
          git diff --staged --quiet || git commit -m "🔄 Atualização diária automática — $(date +%Y-%m-%d)"
          git push
